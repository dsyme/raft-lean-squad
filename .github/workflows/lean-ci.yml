name: Lean CI

on:
  pull_request:
    paths:
      - 'formal-verification/lean/**'
      - 'formal-verification/tests/**'
      - 'src/**'
  push:
    branches:
      - main
    paths:
      - 'formal-verification/lean/**'
      - 'formal-verification/tests/**'
      - 'src/**'
  workflow_dispatch:

jobs:
  build:
    name: Verify Lean Proofs
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: formal-verification/lean

    steps:
      - uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Install Lean toolchain
        run: elan toolchain install $(cat lean-toolchain)

      - name: Show Lean version
        run: lean --version

      - name: Compute cache key
        id: cache-key
        run: |
          if [ -f lake-manifest.json ]; then
            echo "manifest_hash=$(sha256sum lake-manifest.json | cut -c1-16)" >> "$GITHUB_OUTPUT"
          else
            echo "manifest_hash=no-manifest" >> "$GITHUB_OUTPUT"
          fi

      - name: Cache .lake build artefacts
        uses: actions/cache@v4
        with:
          path: formal-verification/lean/.lake
          key: lean-lake-${{ steps.cache-key.outputs.manifest_hash }}
          restore-keys: lean-lake-

      - name: Build and verify all proofs
        run: |
          echo "=== lake build starting ==="
          lake build 2>&1 | tee /tmp/lake_build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          SORRY_COUNT=$(grep -c 'sorry' /tmp/lake_build.log || true)
          echo ""
          echo "=== lake build exit code: $BUILD_EXIT ==="
          echo "=== 'sorry' occurrences in build output: $SORRY_COUNT ==="
          exit $BUILD_EXIT

      - name: Count source-level sorry
        if: success()
        run: |
          SOURCE_SORRY=$(grep -rn "sorry" FVSquad/ --include="*.lean" \
            | grep -v "0 sorry\|Sorry count\|sorry-guarded\|#.*sorry\|-- .*sorry\|/-.*sorry.*-/\|\"sorry" \
            | wc -l || true)
          echo "=== Source-level sorry count (excluding comments/strings): $SOURCE_SORRY ==="
          if [ "$SOURCE_SORRY" -gt 0 ]; then
            echo "⚠️  $SOURCE_SORRY sorry instance(s) found in source:"
            grep -rn "sorry" FVSquad/ --include="*.lean" \
              | grep -v "0 sorry\|Sorry count\|sorry-guarded\|#.*sorry\|-- .*sorry\|/-.*sorry.*-/\|\"sorry" || true
          else
            echo "✅  No sorry in source files"
          fi

      - name: Report proof statistics
        if: success()
        run: |
          THEOREM_COUNT=$(grep -rh "^theorem\|^private theorem" FVSquad/ --include="*.lean" | wc -l || true)
          FILE_COUNT=$(ls FVSquad/*.lean 2>/dev/null | wc -l || true)
          GUARD_COUNT=$(grep -rh "#guard" FVSquad/ --include="*.lean" | wc -l || true)
          CORR_FILE_COUNT=$(ls FVSquad/*Correspondence.lean 2>/dev/null | wc -l || true)
          echo "✅  Proof statistics:"
          echo "    - Lean files:          $FILE_COUNT"
          echo "    - Theorems:            $THEOREM_COUNT"
          echo "    - #guard assertions:   $GUARD_COUNT (across $CORR_FILE_COUNT correspondence files)"

      - name: Report linter warnings
        if: success()
        run: |
          WARNING_COUNT=$(grep -c 'warning:' /tmp/lake_build.log || true)
          if [ "$WARNING_COUNT" -gt 0 ]; then
            echo "⚠️  $WARNING_COUNT linter warning(s) found (build still passed):"
            grep 'warning:' /tmp/lake_build.log || true
          else
            echo "✅  No linter warnings"
          fi

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lake-build-log
          path: /tmp/lake_build.log

  correspondence-tests:
    name: Rust Correspondence Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-correspondence-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-correspondence-

      - name: Run correspondence tests
        run: |
          echo "=== Running Rust correspondence tests ==="
          cargo test correspondence --features protobuf-codec 2>&1 | tee /tmp/corr_test.log
          TEST_EXIT=${PIPESTATUS[0]}
          PASSED=$(grep -c '^test .*\.\.\. ok' /tmp/corr_test.log || true)
          FAILED=$(grep -c '^test .*\.\.\. FAILED' /tmp/corr_test.log || true)
          echo ""
          echo "=== Correspondence test summary ==="
          echo "    Passed: $PASSED"
          echo "    Failed: $FAILED"
          if [ "$PASSED" -lt 17 ]; then
            echo "⚠️  WARNING: expected at least 17 correspondence test functions (got $PASSED)"
          else
            echo "✅  $PASSED correspondence test functions passed (≥17 expected)"
          fi
          echo "=== Correspondence tests done ==="
          exit $TEST_EXIT
